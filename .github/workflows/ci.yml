# Java app runs with SeaLights CD Agent (-javaagent) per:
# https://docs.sealights.io/knowledgebase/setup-and-configuration/sealights-agents-and-plugins/cd-agent/cd-agent-for-java-application
#
# Required repo secrets for full SeaLights (CD + Playwright plugin):
#   SL_TOKEN          — agent token (same family as Playwright; use CD-capable token if your tenant separates them)
#   SL_LAB_ID         — lab id (Integration Build “CD only” lab or unique id from dashboard)
#
# Optional:
#   SL_PROXY                    — if outbound traffic must use a proxy
#   SL_BUILD_SESSION_ID         — when not using lab auto-resolve for Playwright
#   SL_TEST_STAGE, SL_TEST_PROJECT_ID — for sealights-playwright-plugin
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: playwright

    steps:
      - uses: actions/checkout@v4

      - name: Download SeaLights CD Agent for Java
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p .sealights
          cd .sealights
          curl -fsSL -o sl-cd-agent-latest.zip https://agents.sealights.co/sl-cd-agent/sl-cd-agent-latest.zip
          unzip -oq sl-cd-agent-latest.zip
          test -f sl-cd-agent.jar
          echo "CD agent:"
          cat version.txt 2>/dev/null || true
          ls -la sl-cd-agent.jar

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Spring Boot app
        run: mvn -B -f ../pom.xml package -DskipTests

      - name: Start calculator app (with SeaLights CD javaagent when secrets are set)
        working-directory: playwright
        env:
          SL_TOKEN: ${{ secrets.SL_TOKEN }}
          SL_LAB_ID: ${{ secrets.SL_LAB_ID }}
          SL_PROXY: ${{ secrets.SL_PROXY }}
        run: |
          set -e
          JAR=$(ls ../target/calculator-demo-*.jar | head -1)
          AGENT="${GITHUB_WORKSPACE}/.sealights/sl-cd-agent.jar"
          BUILD_NAME="calculator-demo@${GITHUB_SHA:0:12}"

          if [ -n "$SL_TOKEN" ] && [ -n "$SL_LAB_ID" ]; then
            echo "Starting JVM with SeaLights CD Agent (sl.appName=calculator-demo, sl.labId set, sl.buildName=$BUILD_NAME)"
            JAVA_OPTS=(
              "-javaagent:${AGENT}"
              "-Dsl.token=${SL_TOKEN}"
              "-Dsl.appName=calculator-demo"
              "-Dsl.labId=${SL_LAB_ID}"
              "-Dsl.buildName=${BUILD_NAME}"
              "-Dsl.includes=*com.example.*"
              "-Dsl.branchName=${GITHUB_REF_NAME}"
              "-Dsl.log.toConsole=true"
              "-Dsl.log.level=info"
              "--add-opens=java.base/jdk.internal.loader=ALL-UNNAMED"
            )
            if [ -n "$SL_PROXY" ]; then
              JAVA_OPTS+=("-Dsl.proxy=${SL_PROXY}")
            fi
            java "${JAVA_OPTS[@]}" -jar "$JAR" &
          else
            echo "::warning::SL_TOKEN or SL_LAB_ID is empty — starting without SeaLights CD agent. Add repository secrets to enable CD onboarding."
            java -jar "$JAR" &
          fi

          echo "APP_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:8080/ >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          echo "App did not become ready in time"
          exit 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: playwright/package.json

      - name: Install Playwright deps
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Install Chromium
        run: npx playwright install chromium --with-deps

      # Align Playwright plugin lab/stage with CD agent (same SL_LAB_ID; stage name is your test-stage label in SeaLights).
      - name: Run Playwright tests (sealights-playwright-plugin)
        env:
          BASE_URL: http://127.0.0.1:8080
          CI: true
          SL_TOKEN: ${{ secrets.SL_TOKEN }}
          SL_LAB_ID: ${{ secrets.SL_LAB_ID }}
          SL_TEST_STAGE: github-actions
          SL_TEST_PROJECT_ID: calculator-demo
          SL_BUILD_SESSION_ID: ${{ secrets.SL_BUILD_SESSION_ID }}
          SL_PROXY: ${{ secrets.SL_PROXY }}
        run: npm test

      - name: Stop app
        if: always()
        run: kill "$APP_PID" 2>/dev/null || true
